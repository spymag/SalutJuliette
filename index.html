<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salut Juliette Screen Saver</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    <div id="screenSaverContainer">
        <div id="rainbowContainer">
            <div class="rainbow-stripe" id="stripe-red"></div>
            <div class="rainbow-stripe" id="stripe-orange"></div>
            <div class="rainbow-stripe" id="stripe-yellow"></div>
            <div class="rainbow-stripe" id="stripe-green"></div>
            <div class="rainbow-stripe" id="stripe-blue"></div>
            <div class="rainbow-stripe" id="stripe-indigo"></div>
        </div>
        <h1 id="staticText">Salut Juliette</h1>
        <img id="unicorn" src="unicorn.png" alt="Unicorn" style="display: none;">
    </div>
    <script src="script.js"></script>
</body>
</html>
